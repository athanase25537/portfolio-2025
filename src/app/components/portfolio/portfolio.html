<section id="projects" class="section container portfolio">
    <h2 class="section-title" data-reveal>My <span>Projects</span></h2>
    <div class="row portfolio-grid">
        @for(card of cards; track $index) {
            <app-card-portfolio class="content" data-reveal [style.--delay]="($index * 0.08) + 's'" [card]="card"/>
        }
    </div>
</section>
