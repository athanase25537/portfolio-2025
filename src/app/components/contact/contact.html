<section id="contact" class="section container contact-section">
    <h2 class="section-title" data-reveal>Get In <span>Touch</span></h2>
    <div class="contact rounded d-flex glass" data-reveal style="--delay: 0.1s">
        <div class="info">
            <h2 class="fs-6 fw-bold mb-3">Contacts</h2>
            <ul class="contact-info mb-5 p-0">
                <li class="mb-3">
                    <i class="fs-4 fa-regular fa-envelope"></i><strong>{{ email }}</strong>
                </li>

                <li class="mb-3">
                    <i class="fs-4 fa-solid fa-phone"></i><strong>{{ phone }}</strong>
                </li>

                <li class="mb-3">
                    <i class="fs-4 fa-solid fa-location-dot"></i><strong>{{ address }}</strong>
                </li>
            </ul>

            <h2 class="fs-6 fw-bold mb-3">Social Media</h2>
            <ul class="social p-0">
                <li>
                    <a href="https://www.linkedin.com/in/andriamasy-athanase-marc-ba50832b9" target="_blank"><i class="fs-1 me-3 fa-brands fa-linkedin"></i></a>
                </li>

                <li>
                    <a href="https://www.facebook.com/andriamasy.marc.athanase" target="_blank"><i class="fs-1 me-3 fa-brands fa-facebook"></i></a>
                </li>

                <li>
                    <a href="https://github.com/athanase25537" target="_blank"><i class="fs-1 fa-brands fa-github"></i></a>
                </li>
            </ul>
        </div>
        
        <form class="rounded form-group" (ngSubmit)="sendEmail()" #contactForm="ngForm">

    <h1 class="fs-5 mb-4">
        Send me a <span>message</span>
    </h1>

    <!-- Message success -->
    @if(successMessage$ | async) {
        <div class="mb-3 p-3 rounded bg-green-100 text-green-700 text-sm">
            {{ successMessage$ | async}}
        </div>
    }

    <!-- Message error -->
    @if(errorMessage$ | async) {
        <div class="mb-3 p-3 rounded bg-red-100 text-red-700 text-sm">
            {{ errorMessage$ | async }}
        </div>
    }


    <!-- Name -->
    <div class="mb-3">
        <input
            id="name"
            type="text"
            name="name"
            class="form-control"
            placeholder="Name"
            autocomplete="name"
            required
            maxlength="100"
            [(ngModel)]="form.name">
    </div>


    <!-- Email -->
    <div class="mb-3">
        <input
            id="email"
            type="email"
            name="email"
            class="form-control"
            placeholder="Your email"
            autocomplete="email"
            required
            [(ngModel)]="form.email">
    </div>


    <!-- Message -->
    <div class="mb-2">
        <textarea
            id="message"
            name="message"
            class="form-control"
            rows="6"
            placeholder="Tell me about your project..."
            maxlength="1000"
            required
            [(ngModel)]="form.message"></textarea>
    </div>


    <!-- Submit -->
    <button
    type="submit"
    class="my-btn pill w-full flex items-center justify-center gap-2
           disabled:opacity-50 
           disabled:cursor-not-allowed
           disabled:bg-gray-400
           disabled:text-gray-200"
    [disabled]="contactForm.invalid || (isSending$ | async)">


        @if(isSending$ | async) {

            <svg
                class="w-5 h-5 animate-spin"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24">

                <circle
                    class="opacity-25"
                    cx="12"
                    cy="12"
                    r="10"
                    stroke="currentColor"
                    stroke-width="4">
                </circle>

                <path
                    class="opacity-75"
                    fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z">
                </path>

            </svg>

            <span>Sending...</span>

        } @else {

            <span>Send Message</span>

        }

    </button>

</form>
    </div>
</section>
