<section id="contact" class="section container contact-section">
    <h2 class="section-title" data-reveal>Get In <span>Touch</span></h2>
    <div class="contact rounded d-flex glass" data-reveal style="--delay: 0.1s">
        <div class="info">
            <h2 class="fs-6 fw-bold mb-3">Contacts</h2>
            <ul class="contact-info mb-5 p-0">
                <li class="mb-3">
                    <i class="fs-4 fa-regular fa-envelope"></i><strong>{{ email }}</strong>
                </li>

                <li class="mb-3">
                    <i class="fs-4 fa-solid fa-phone"></i><strong>{{ phone }}</strong>
                </li>

                <li class="mb-3">
                    <i class="fs-4 fa-solid fa-location-dot"></i><strong>{{ address }}</strong>
                </li>
            </ul>

            <h2 class="fs-6 fw-bold mb-3">Social Media</h2>
            <ul class="social p-0">
                <li>
                    <a href="https://www.linkedin.com/in/andriamasy-athanase-marc-ba50832b9" target="_blank"><i class="fs-1 me-3 fa-brands fa-linkedin"></i></a>
                </li>

                <li>
                    <a href="https://www.facebook.com/andriamasy.marc.athanase" target="_blank"><i class="fs-1 me-3 fa-brands fa-facebook"></i></a>
                </li>

                <li>
                    <a href="https://github.com/athanase25537" target="_blank"><i class="fs-1 fa-brands fa-github"></i></a>
                </li>
            </ul>
        </div>
        <form class="rounded form-group">
            <h1 class="fs-5 mb-4">Send me a <span>message</span></h1>
            <input type="text" name="name" placeholder="Your name" class="form-control mb-3">
            <input id="email" name="email" type="email" placeholder="Your email" class="form-control mb-3">

            <textarea name="message" placeholder="Your message" class="form-control mb-3" id="message"></textarea>

            <button class="my-btn pill"><span>Send</span></button>
        </form>
    </div>
</section>
