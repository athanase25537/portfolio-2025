<section id="services" class="section container services">
    <h2 class="section-title" data-reveal>What I <span>Do</span></h2>
    <div class="row services-grid">
        @for(card of cards; track $index) {
            <div class="col-4 mb-3" data-reveal [style.--delay]="($index * 0.08) + 's'">
                <app-card [card]="card"/>
            </div>
        }
    </div>
</section>
