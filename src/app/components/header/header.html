
<header [ngClass]="{'show': show}">
    <button class="menu-toggle" (click)="onClick()" aria-label="Basculer la navigation" [attr.aria-expanded]="show" aria-controls="site-nav">
        @if(show) {
            <i class="fa-solid fa-xmark"></i>
        } @else {
            <i class="fa-solid fa-bars"></i>
        }
    </button>

    <a class="logo" href="#home" (click)="onClickNav('home')">
        Athanase <span>Marc</span>
    </a>

    <ul id="site-nav" class="nav-links">
        <li><a href="#home" (click)="onClickNav('home')" [ngClass]="{'active': activeLink() == 'home'}">Home</a></li>
        <li><a href="#about" (click)="onClickNav('about')" [ngClass]="{'active': activeLink() == 'about'}">About</a></li>
        <li><a href="#skills" (click)="onClickNav('skills')" [ngClass]="{'active': activeLink() == 'skills'}">Skills</a></li>
        <li><a href="#projects" (click)="onClickNav('projects')" [ngClass]="{'active': activeLink() == 'projects'}">Projects</a></li>
        <li class="theme">
            <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="theme === 'dark' ? 'Activer le mode clair' : 'Activer le mode sombre'">
                @if (theme === 'dark') {
                    <i class="fa-solid fa-sun"></i>
                } @else {
                    <i class="fa-solid fa-moon"></i>
                }
            </button>
        </li>
        <li class="cta"><a href="#contact" (click)="onClickNav('contact')" [ngClass]="{'active': activeLink() == 'contact'}">Contact</a></li>
    </ul>
</header>
